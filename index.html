<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Locations</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; -webkit-tap-highlight-color: transparent; overflow: hidden; }
  body { height: 100%; background: #0D0D0D; color: #F0F0F0; font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; overscroll-behavior: none; overflow: hidden; }

  .sync-bar { display: flex; align-items: center; gap: 8px; padding: 8px 20px; background: #0A0A0A; border-bottom: 1px solid #1A1A1A; font-size: 0.72rem; color: #444; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.ok { background: #00C07A; }
  .sync-dot.loading { background: #FFB300; animation: pulse 1s infinite; }
  .sync-dot.error { background: #FF3B30; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .sync-text { flex: 1; }
  .sync-btn { background: none; border: 1px solid #2A2A2A; color: #555; padding: 4px 10px; border-radius: 6px; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.7rem; cursor: pointer; -webkit-appearance: none; }
  .sync-btn:active { color: #fff; border-color: #555; }

  .app-nav { display: flex; background: #0A0A0A; border-bottom: 1px solid #1E1E1E; }
  .app-tab { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; color: #444; padding: 14px 4px; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.72rem; font-weight: 600; cursor: pointer; letter-spacing: 0.03em; text-transform: uppercase; transition: all 0.15s; -webkit-appearance: none; }
  .app-tab.active { color: #fff; border-bottom-color: #fff; }

  .page { display: none; }
  .page.active { display: block; }
  /* Journal : seul onglet avec défilement interne */
  #pageJournal.active { display: flex; flex-direction: column; height: calc(100vh - 86px); }
  #pageJournal .page-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 20px calc(24px + env(safe-area-inset-bottom, 0)); }

  .header { padding: 14px 16px 12px; border-bottom: 1px solid #1E1E1E; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; width: 100%; }
  .title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.04em; color: #fff; }
  .subtitle { display: none; }
  .month-nav { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: flex-end; }
  .nav-btn { background: none; border: 1px solid #2A2A2A; color: #888; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-appearance: none; }
  .nav-btn:active { border-color: #555; color: #fff; background: #1A1A1A; }
  .month-name { font-size: 0.95rem; font-weight: 600; color: #fff; flex: 1; text-align: center; cursor: pointer; }
  .mp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-bottom: 8px; }
  .mp-cell { padding: 16px 4px; border-radius: 12px; background: #1A1A1A; border: none; color: #ddd; font-size: 0.8rem; font-weight: 600; cursor: pointer; -webkit-appearance: none; font-family: -apple-system, 'Helvetica Neue', sans-serif; white-space: nowrap; }
  .mp-cell:active { background: #2A2A2A; }
  .mp-cell.current { background: #2E7CF6; color: #fff; }

  .stats-row { display: flex; flex-direction: column; gap: 8px; }
  .total-card { background: #161616; border: 1px solid #1E1E1E; border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 16px; width: 100%; }
  .total-card-main { display: flex; flex-direction: column; gap: 1px; }
  .total-card-label { font-size: 0.62rem; color: #555; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .total-card-value { font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .total-card-nights { font-size: 0.72rem; color: #444; font-variant-numeric: tabular-nums; }
  .total-card-breakdown { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .breakdown-line { display: flex; align-items: center; gap: 7px; font-size: 0.78rem; }
  .breakdown-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .breakdown-name { color: #888; white-space: nowrap; }
  .breakdown-amount { color: #fff; font-weight: 600; font-variant-numeric: tabular-nums; margin-left: auto; padding-left: 8px; }
  .legend-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 7px 12px; background: #111; border: 1px solid #1E1E1E; border-radius: 10px; width: 100%; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; color: #666; }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  #pageCalendar.active { display: flex; flex-direction: column; height: calc(100vh - 86px); }
  .cal-wrap { padding: 10px 16px calc(12px + env(safe-area-inset-bottom, 0)); box-sizing: border-box; width: 100%; flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 1fr; gap: 5px; width: 100%; flex: 1; min-height: 0; }
  .cal-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%; flex-shrink: 0; }
  .cal-dow { text-align: center; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888; padding: 2px 0 6px; }
  .cal-empty { min-height: 0; }
  .cal-day { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 10px; cursor: pointer; position: relative; padding: 4px; min-height: 0; width: 100%; -webkit-appearance: none; appearance: none; outline: none; display: flex; flex-direction: column; gap: 3px; overflow: visible; z-index: 1; }
  .cal-day:active { transform: scale(0.95); }
  .cal-day.today { border-color: #888; border-width: 1.5px; }
  .cal-day.both .cal-daynum { color: #FF3B30; }
  .cal-daynum { font-size: 0.82rem; font-weight: 700; color: #5A5A5A; line-height: 1; text-align: center; padding: 1px 0 2px; }
  .cal-day.today .cal-daynum { color: #fff; }
  .cal-sub { flex: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.62rem; font-weight: 700; color: #333; position: relative; }
  /* Bande de couleur d'une location — fine, centrée verticalement */
  .cal-band { width: 100%; height: 18px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.85); box-sizing: border-box; display: flex; align-items: center; justify-content: center; position: relative; overflow: visible; }
  .cal-band.empty-band { border-color: rgba(255,255,255,0.12); }
  .cal-band-note { font-size: 0.58rem; font-weight: 700; color: #fff; line-height: 1; pointer-events: none; white-space: nowrap; }
  /* Prolongement entre nuits consécutives — chaque bande s'étend de la moitié du gap (15px/2 ≈ 8px) pour se rejoindre proprement au milieu */
  .cal-band.link-left { border-top-left-radius: 0; border-bottom-left-radius: 0; border-left: none; margin-left: -8px; width: calc(100% + 8px); }
  .cal-band.link-right { border-top-right-radius: 0; border-bottom-right-radius: 0; border-right: none; margin-right: -8px; width: calc(100% + 8px); }
  .cal-band.link-left.link-right { border-radius: 0; width: calc(100% + 16px); }
  .cal-sub-amount { font-size: 0.58rem; font-weight: 700; opacity: 0.95; position: relative; z-index: 1; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); align-items: flex-end; justify-content: center; z-index: 100; }
  .overlay.open { display: flex; }
  .modal { background: #111; border: 1px solid #242424; border-radius: 24px 24px 0 0; width: 100%; max-width: 500px; overflow: hidden; max-height: 90vh; overflow-y: auto; animation: slideUp 0.22s cubic-bezier(0.34,1.2,0.64,1); padding-bottom: env(safe-area-inset-bottom, 0); }
  @keyframes slideUp { from { transform: translateY(60px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  .modal-handle { width: 36px; height: 4px; background: #2A2A2A; border-radius: 2px; margin: 12px auto 0; }
  .modal-header { padding: 16px 20px 14px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #1A1A1A; }
  .modal-date { font-size: 1.2rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
  .modal-status { margin-top: 5px; display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-badge { font-size: 0.78rem; font-weight: 600; }
  .modal-free { font-size: 0.78rem; color: #3A3A3A; }
  .close-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 1.1rem; padding: 2px 6px; border-radius: 6px; }
  .modal-body { padding: 18px 20px 32px; display: flex; flex-direction: column; gap: 14px; }
  #modalForm { padding: 12px 20px calc(18px + env(safe-area-inset-bottom, 0)); gap: 11px; }
  #modalForm .form-group { gap: 5px; }
  #modalForm .form-label { font-size: 0.64rem; }
  #modalForm .back-btn { padding-bottom: 0; }
  #modalForm .note-input { rows: 2; }
  #modalForm .choice-btn { padding: 8px 6px; }
  #modalForm .date-btn { padding: 9px 12px; min-height: 40px; }
  #modalForm .amount-input { padding: 10px 42px 10px 14px; }
  #modalForm .note-input { padding: 9px 12px; }
  #modalForm .save-btn { padding: 13px 8px; }
  #modalForm .delete-form-btn { padding: 11px 8px; }
  #modalForm #noteInput { min-height: 38px; }
  .form-row { display: flex; gap: 10px; }
  .delete-form-btn { background: none; border: 1px solid #3A1F1F; color: #FF3B30; border-radius: 12px; padding: 13px 8px; width: 100%; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.78rem; font-weight: 600; cursor: pointer; -webkit-appearance: none; margin-top: 4px; }
  .delete-form-btn:active { background: #2A1515; }

  /* Cards (vue principale) */
  .apt-card { background: #161616; border: 1.5px solid #242424; border-radius: 16px; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
  .apt-card-head { display: flex; justify-content: space-between; align-items: center; }
  .apt-card-name { font-size: 1rem; font-weight: 700; }
  .apt-card-amount { font-size: 0.92rem; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
  .apt-card-plat { font-size: 0.85rem; font-weight: 600; }
  .apt-card-period { font-size: 0.78rem; color: #888; font-weight: 500; }
  .apt-card-note { font-size: 0.8rem; color: #aaa; background: #1A1A1A; border-radius: 8px; padding: 8px 10px; line-height: 1.4; }
  .apt-card-free { font-size: 0.85rem; color: #3A3A3A; }
  .apt-card-actions { display: flex; gap: 8px; margin-top: 2px; }
  .card-edit-btn, .card-del-btn { flex: 1; background: #1E1E1E; border: 1px solid #2A2A2A; color: #ccc; border-radius: 10px; padding: 11px 8px; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
  .card-edit-btn:active { border-color: #2E7CF6; color: #2E7CF6; }
  .card-del-btn:active { border-color: #FF3B30; color: #FF3B30; }
  .card-add-btn { background: #1A1A1A; border: 1.5px solid; border-radius: 10px; padding: 13px 8px; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; -webkit-appearance: none; }
  .card-add-btn:active { background: #222; }

  .back-btn { background: none; border: none; color: #777; font-size: 0.85rem; font-weight: 600; cursor: pointer; padding: 0 0 4px; text-align: left; -webkit-appearance: none; align-self: flex-start; }
  .back-btn:active { color: #fff; }
  .form-banner { font-size: 0.92rem; font-weight: 600; color: #ccc; padding-bottom: 4px; }

  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-label { font-size: 0.68rem; color: #444; text-transform: uppercase; letter-spacing: 0.09em; font-weight: 600; }
  .btn-group { display: flex; gap: 7px; flex-wrap: wrap; }
  .choice-btn { flex: 1; background: #161616; border: 1px solid #242424; color: #666; border-radius: 10px; padding: 9px 6px; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.72rem; font-weight: 600; cursor: pointer; white-space: nowrap; min-width: 0; -webkit-appearance: none; }
  .choice-btn:active { background: #1E1E1E; }
  .choice-btn.sel { border-color: #555; color: #fff; background: #1E1E1E; }
  .dates-row { display: flex; gap: 10px; }
  .date-field { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .date-field-label { font-size: 0.68rem; color: #666; font-weight: 600; }
  .date-input { width: 100%; background: #161616; border: 1px solid #242424; border-radius: 10px; padding: 11px 12px; color: #fff; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.92rem; outline: none; -webkit-appearance: none; appearance: none; min-height: 44px; }
  .date-input:focus { border-color: #444; }
  .date-btn { width: 100%; background: #161616; border: 1px solid #242424; border-radius: 10px; padding: 11px 12px; color: #fff; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.92rem; outline: none; -webkit-appearance: none; min-height: 44px; cursor: pointer; text-align: left; font-weight: 600; }
  .date-btn:active { border-color: #444; }
  /* Date picker bottom sheet */
  .dp-overlay { z-index: 200; }
  .dp-sheet { background: #141414; border: 1px solid #242424; border-radius: 24px 24px 0 0; width: 100%; max-width: 500px; padding: 0 16px calc(20px + env(safe-area-inset-bottom, 0)); animation: slideUp 0.22s cubic-bezier(0.34,1.2,0.64,1); }
  .dp-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 4px 14px; }
  .dp-title { font-size: 1rem; font-weight: 700; color: #fff; }
  .dp-nav { width: 36px; height: 36px; border-radius: 50%; background: #1E1E1E; border: 1px solid #2A2A2A; color: #ccc; font-size: 1rem; cursor: pointer; -webkit-appearance: none; }
  .dp-nav:active { background: #2A2A2A; }
  .dp-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
  .dp-dow span { text-align: center; font-size: 0.66rem; font-weight: 600; color: #555; text-transform: uppercase; }
  .dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .dp-cell { aspect-ratio: 1; border-radius: 10px; background: #1A1A1A; border: none; color: #ddd; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-appearance: none; }
  .dp-cell:active { background: #2A2A2A; }
  .dp-cell.empty { background: transparent; cursor: default; }
  .dp-cell.selected { background: #2E7CF6; color: #fff; }
  .dp-cell.today { box-shadow: inset 0 0 0 1.5px #555; }
  /* Confirmation suppression — boîte centrée */
  .confirm-overlay { z-index: 300; align-items: center; justify-content: center; padding: 24px; }
  .confirm-box { background: #161616; border: 1px solid #2A2A2A; border-radius: 20px; padding: 24px 22px; width: 100%; max-width: 360px; text-align: center; animation: popIn 0.18s cubic-bezier(0.34,1.4,0.64,1); }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .confirm-icon { font-size: 2rem; margin-bottom: 10px; }
  .confirm-text { font-size: 0.95rem; color: #eee; line-height: 1.5; margin-bottom: 20px; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-cancel, .confirm-ok { flex: 1; border-radius: 12px; padding: 13px 8px; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; -webkit-appearance: none; }
  .confirm-cancel { background: #1E1E1E; border: 1px solid #2A2A2A; color: #ccc; }
  .confirm-cancel:active { background: #2A2A2A; }
  .confirm-ok { background: #FF3B30; border: none; color: #fff; }
  .confirm-ok:active { background: #D32A20; }
  .note-input { width: 100%; background: #161616; border: 1px solid #242424; border-radius: 10px; padding: 11px 12px; color: #fff; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.92rem; outline: none; -webkit-appearance: none; resize: none; line-height: 1.4; }
  .note-input:focus { border-color: #444; }
  .note-input::placeholder { color: #444; }
  .dates-hint { font-size: 0.76rem; color: #555; margin-top: 6px; display: block; }
  .input-wrap { position: relative; }
  .amount-input { width: 100%; background: #161616; border: 1px solid #242424; border-radius: 10px; padding: 13px 42px 13px 14px; color: #fff; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 1rem; outline: none; -webkit-appearance: none; appearance: none; }
  .amount-input:focus { border-color: #444; }
  .input-unit { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #444; font-size: 0.85rem; pointer-events: none; }
  .save-btn { background: #fff; color: #000; border: none; border-radius: 12px; padding: 14px 8px; width: 100%; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; -webkit-appearance: none; margin-top: 4px; letter-spacing: 0.01em; }
  .save-btn:active { background: #D0D0D0; transform: scale(0.98); }

  #pageGains.active { display: flex; flex-direction: column; height: calc(100vh - 86px); }
  #pageGains .page-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 20px calc(24px + env(safe-area-inset-bottom, 0)); }
  .page-content { padding: 20px; }
  .page-title { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: -0.03em; margin-bottom: 16px; }

  .journal-list { display: flex; flex-direction: column; gap: 10px; }
  .journal-group { background: #131313; border: 1px solid #1E1E1E; border-radius: 12px; overflow: hidden; }
  .journal-group-head { width: 100%; background: none; border: none; display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; -webkit-appearance: none; font-family: -apple-system, 'Helvetica Neue', sans-serif; }
  .journal-group-head:active { background: #181818; }
  .journal-chevron { color: #666; font-size: 0.7rem; transition: transform 0.18s; flex-shrink: 0; }
  .journal-chevron.open { transform: rotate(90deg); }
  .journal-group-title { flex: 1; text-align: left; font-size: 0.88rem; font-weight: 600; color: #ddd; }
  .journal-group-count { background: #242424; color: #888; font-size: 0.72rem; font-weight: 700; min-width: 22px; height: 22px; border-radius: 11px; display: flex; align-items: center; justify-content: center; padding: 0 6px; }
  .journal-group-body { display: none; flex-direction: column; gap: 8px; padding: 0 12px 12px; }
  .journal-group-body.open { display: flex; }
  .journal-item { background: #161616; border: 1px solid #1E1E1E; border-radius: 12px; padding: 13px 16px; display: flex; flex-direction: column; gap: 4px; }
  .journal-action { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
  .journal-action.add { color: #00C07A; }
  .journal-action.del { color: #FF3B30; }
  .journal-action.edit { color: #2E7CF6; }
  .journal-detail { font-size: 0.88rem; color: #ccc; }
  .journal-meta { font-size: 0.72rem; color: #3A3A3A; margin-top: 2px; }
  .empty-state { color: #333; font-size: 0.88rem; text-align: center; padding: 40px 0; }

  .gains-section { margin-bottom: 24px; }
  .gains-section-title { font-size: 0.68rem; color: #555; text-transform: uppercase; letter-spacing: 0.09em; font-weight: 600; margin-bottom: 10px; }
  .gains-table { width: 100%; border-collapse: collapse; }
  .gains-table th { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 0.07em; padding: 8px 10px; text-align: right; border-bottom: 1px solid #1E1E1E; }
  .gains-table th:first-child { text-align: left; }
  .gains-table td { padding: 10px; font-size: 0.85rem; color: #ccc; border-bottom: 1px solid #141414; text-align: right; font-variant-numeric: tabular-nums; }
  .gains-table td:first-child { text-align: left; color: #888; }
  .gains-table tr.total-row td { color: #fff; font-weight: 700; border-top: 1px solid #2A2A2A; border-bottom: none; }
  .gains-grand-total { background: #161616; border: 1px solid #1E1E1E; border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .gains-grand-label { font-size: 0.72rem; color: #555; text-transform: uppercase; letter-spacing: 0.09em; font-weight: 600; }
  .gains-grand-value { font-size: 1.6rem; font-weight: 700; color: #00C07A; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }

  /* ── Notes */
  .notes-wrap { padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0)); display: flex; flex-direction: column; gap: 12px; height: calc(100vh - 86px); box-sizing: border-box; }
  .notes-textarea { flex: 1; background: #161616; border: 1px solid #1E1E1E; border-radius: 16px; padding: 18px; color: #F0F0F0; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.95rem; line-height: 1.6; outline: none; resize: none; -webkit-appearance: none; }
  .notes-textarea:focus { border-color: #333; }
  .notes-textarea::placeholder { color: #2A2A2A; }
  .notes-save-btn { background: #fff; color: #000; border: none; border-radius: 12px; padding: 14px; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; -webkit-appearance: none; }
  .notes-save-btn:active { background: #D0D0D0; }
  .notes-status { font-size: 0.72rem; color: #444; text-align: center; }
</style>
</head>
<body>

<!-- PAGE CALENDRIER -->

  <div class="header">

          <div class="breakdown-line">

    <div class="modal-handle"></div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwErnP_VVyhdgmxO6ppR_4RovQ48KEXPwPvbRhBGupUqvTmJxgjoTg5tUxYo1mUp5fw/exec";

const MONTHS_FR = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const DAYS_FR = ["L","M","M","J","V","S","D"];
const PLATFORM_COLORS = { Airbnb: "#FF385C", Booking: "#003580", Perso: "#00C07A" };
const PLATFORM_ICONS  = { Airbnb: "◈", Booking: "▣", Perso: "◉" };
const STATUS_COLOR    = { both: "#FF3B30", bh: "#2E7CF6", studio: "#FFB300", free: null };
const APT_CAL_COLORS  = { "Bel Horizonte": "#2E7CF6", "Studio": "#FF8A00" };
// Versions adoucies (couleurs pleines, pré-mélangées sur fond sombre) pour éviter le doublement d'opacité aux jonctions
const APT_CAL_SOFT    = { "Bel Horizonte": "#2C5FA8", "Studio": "#B86A1E" };

const now = new Date();
let curYear = now.getFullYear(), curMonth = now.getMonth();
let bookings = {}, journal = [], notes = "";
let modalDay = null, editingApt = null, editingStay = null, pendingDelete = null;
let selApt = "Bel Horizonte", selPlat = "Airbnb";
let syncTimeout = null, notesTimeout = null;

const dkey = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const daysInMonth = (y,m) => new Date(y,m+1,0).getDate();
const firstWeekday = (y,m) => { const d=new Date(y,m,1).getDay(); return d===0?6:d-1; };
const todayKey = dkey(now.getFullYear(), now.getMonth(), now.getDate());

function getStatus(dk) {
  const b = bookings[dk];
  const bh = !!(b && b["Bel Horizonte"]), st = !!(b && b["Studio"]);
  if (bh && st) return "both"; if (bh) return "bh"; if (st) return "studio"; return "free";
}

// ── Gestion des séjours (réservations inséparables)
// Toutes les nuits d'un séjour partagent le même "stay" ID.
function findStayDates(apt, stayId) {
  // Retourne la liste triée des clés-date du séjour
  const dates = [];
  Object.keys(bookings).forEach(function(dk) {
    const bk = bookings[dk][apt];
    if (bk && bk.stay === stayId) dates.push(dk);
  });
  dates.sort();
  return dates;
}

function stayRange(apt, stayId) {
  // Retourne { start: YYYY-MM-DD (1ère nuit), end: YYYY-MM-DD (jour de départ = lendemain dernière nuit), nights }
  const dates = findStayDates(apt, stayId);
  if (dates.length === 0) return null;
  const start = dates[0];
  const lastNight = new Date(dates[dates.length-1] + "T00:00:00");
  const endD = new Date(lastNight); endD.setDate(endD.getDate() + 1);
  const end = dkey(endD.getFullYear(), endD.getMonth(), endD.getDate());
  return { start: start, end: end, nights: dates.length, dates: dates };
}

function deleteStay(apt, stayId) {
  const dates = findStayDates(apt, stayId);
  dates.forEach(function(dk) {
    if (bookings[dk] && bookings[dk][apt]) {
      delete bookings[dk][apt];
      if (Object.keys(bookings[dk]).length === 0) delete bookings[dk];
    }
  });
  return dates;
}

// Vérifie si une période début→fin chevauche une résa existante pour cet appart.
// excludeStay : ID de séjour à ignorer (utile en modification)
function hasOverlap(apt, startStr, endStr, excludeStay) {
  let cur = new Date(startStr + "T00:00:00");
  const end = new Date(endStr + "T00:00:00");
  while (cur < end) {
    const dk = dkey(cur.getFullYear(), cur.getMonth(), cur.getDate());
    const bk = bookings[dk] && bookings[dk][apt];
    if (bk && bk.stay !== excludeStay) return true;
    cur.setDate(cur.getDate() + 1);
  }
  return false;
}

function newStayId() {
  return "s" + Date.now() + "_" + Math.floor(Math.random()*10000);
}

// ── Pages
function showPage(name, btn) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".app-tab").forEach(t => t.classList.remove("active"));
  document.getElementById("page" + name.charAt(0).toUpperCase() + name.slice(1)).classList.add("active");
  btn.classList.add("active");
  if (name === "journal") renderJournal();
  if (name === "gains")   renderGains();
  if (name === "notes")   loadNotesUI();
}

// ── Sync
function setSyncStatus(state, text) {
  document.getElementById("syncDot").className = "sync-dot " + state;
  document.getElementById("syncText").textContent = text;
}

function normalizeDate(raw) {
  var s = raw.toString().trim();
  if (s.match(/^\d{4}-\d{2}-\d{2}$/)) return s;
  var d = new Date(s);
  if (!isNaN(d)) return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  return s;
}

async function loadFromSheets() {
  setSyncStatus("loading", "Chargement…");
  try {
    const res = await fetch(SCRIPT_URL);
    const json = await res.json();
    if (!json.ok) throw new Error("err");
    bookings = {};
    json.rows.forEach(function(r) {
      if (!r.date || !r.apt || !r.platform) return;
      var date = normalizeDate(r.date);
      if (!bookings[date]) bookings[date] = {};
      bookings[date][r.apt] = { platform: r.platform, amount: r.amount || "", stay: r.stay || "", note: r.note || "", guests: r.guests || "" };
    });
    if (json.journal) journal = json.journal;
    if (json.notes !== undefined) notes = json.notes;
    saveLocal();
    setSyncStatus("ok", "Synchronisé · " + new Date().toLocaleTimeString("fr-FR", {hour:"2-digit",minute:"2-digit"}));
    renderCalendar();
  } catch(e) {
    setSyncStatus("error", "Erreur sync — données locales");
    loadLocal(); renderCalendar();
  }
}

async function saveToSheets() {
  setSyncStatus("loading", "Sauvegarde…");
  try {
    const rows = [];
    Object.keys(bookings).sort().forEach(function(date) {
      Object.keys(bookings[date]).forEach(function(apt) {
        var b = bookings[date][apt];
        rows.push({ date: date, apt: apt, platform: b.platform, amount: b.amount || "", stay: b.stay || "", note: b.note || "", guests: b.guests || "" });
      });
    });
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ rows: rows, journal: journal, notes: notes })
    });
    const json = await res.json();
    if (!json.ok) throw new Error("err");
    saveLocal();
    setSyncStatus("ok", "Sauvegardé · " + new Date().toLocaleTimeString("fr-FR", {hour:"2-digit",minute:"2-digit"}));
  } catch(e) {
    saveLocal();
    setSyncStatus("error", "Erreur sync — sauvegarde locale");
  }
}

function scheduleSave() { saveLocal(); clearTimeout(syncTimeout); syncTimeout = setTimeout(saveToSheets, 1500); }
function manualSync() { loadFromSheets(); }

function saveLocal() {
  try { localStorage.setItem("loc_v5", JSON.stringify({ bookings, journal, notes })); } catch(e) {}
}
function loadLocal() {
  try {
    var d = localStorage.getItem("loc_v5");
    if (d) { var p = JSON.parse(d); bookings = p.bookings||{}; journal = p.journal||[]; notes = p.notes||""; }
  } catch(e) {}
}

function addJournalEntry(action, apt, date, platform, amount) {
  journal.unshift({ ts: new Date().toISOString(), action, apt, date, platform, amount: amount || "" });
}

// ── Calendrier
function renderCalendar() {
  const days = daysInMonth(curYear, curMonth), offset = firstWeekday(curYear, curMonth);
  const grid = document.getElementById("calGrid");
  document.getElementById("calDow").innerHTML = DAYS_FR.map(d => '<div class="cal-dow">' + d + '</div>').join("");
  grid.innerHTML = "";
  for (let i=0; i<offset; i++) { const el = document.createElement("div"); el.className = "cal-empty"; grid.appendChild(el); }
  for (let day=1; day<=days; day++) {
    const dk = dkey(curYear, curMonth, day);
    const b = bookings[dk] || {};
    const bhBooked = !!b["Bel Horizonte"], stBooked = !!b["Studio"];
    const isToday = dk === todayKey;
    const btn = document.createElement("button");
    btn.className = `cal-day${isToday?" today":""}${(bhBooked && stBooked)?" both":""}`;
    btn.onclick = () => openModal(day);

    // Numéro du jour
    const dnum = document.createElement("div");
    dnum.className = "cal-daynum";
    dnum.textContent = day;
    btn.appendChild(dnum);

    // Sous-cases : Bel Horizonte puis Studio — couleur fixe par appartement
    ["Bel Horizonte","Studio"].forEach(apt => {
      const bk = b[apt];
      const sub = document.createElement("div");
      sub.className = "cal-sub";
      if (bk) {
        // Continuité si même séjour (stay) que la veille / le lendemain
        const prevDate = new Date(curYear, curMonth, day - 1);
        const nextDate = new Date(curYear, curMonth, day + 1);
        const prevDk = dkey(prevDate.getFullYear(), prevDate.getMonth(), prevDate.getDate());
        const nextDk = dkey(nextDate.getFullYear(), nextDate.getMonth(), nextDate.getDate());
        const prevBk = bookings[prevDk] && bookings[prevDk][apt];
        const nextBk = bookings[nextDk] && bookings[nextDk][apt];
        const stay = bk.stay || "";
        const contPrev = !!stay && prevBk && prevBk.stay === stay;
        const contNext = !!stay && nextBk && nextBk.stay === stay;
        const dow = (offset + day - 1) % 7; // 0=lundi … 6=dimanche

        const band = document.createElement("div");
        band.className = "cal-band";
        band.style.background = APT_CAL_SOFT[apt];
        if (contPrev && dow !== 0) band.classList.add("link-left");
        if (contNext && dow !== 6) band.classList.add("link-right");
        if (contNext && dow === 6) band.classList.add("link-right"); // dimanche : ouvert à droite
        if (contPrev && dow === 0) band.classList.add("link-left");  // lundi : ouvert à gauche
        // Afficher le nombre de personnes au début du séjour (ou en début de semaine)
        if ((!contPrev || dow === 0) && (bk.guests || bk.note)) {
          const info = document.createElement("span");
          info.className = "cal-band-note";
          let txt = "";
          if (bk.guests) txt += bk.guests + "👤";
          if (bk.note) txt += (txt ? " " : "") + "📝";
          info.textContent = txt;
          band.appendChild(info);
        }
        sub.appendChild(band);
      } else {
        const band = document.createElement("div");
        band.className = "cal-band empty-band";
        band.style.background = APT_CAL_COLORS[apt] + "1A"; // couleur de l'appart à très faible opacité (~10%)
        sub.appendChild(band);
      }
      btn.appendChild(sub);
    });

    grid.appendChild(btn);
  }
  document.getElementById("monthName").textContent = `${MONTHS_FR[curMonth]} ${curYear}`;
  document.getElementById("subtitle").textContent  = `Gestion · ${MONTHS_FR[curMonth]} ${curYear}`;
  updateStats();
}

function updateStats() {
  let nBH=0, nST=0, rBH=0, rST=0;
  const prefix = dkey(curYear, curMonth, 1).slice(0,7);
  Object.keys(bookings).forEach(function(dk) {
    if (dk.slice(0,7) !== prefix) return;
    var day = bookings[dk];
    if (day["Bel Horizonte"]) { nBH++; rBH += Number(day["Bel Horizonte"].amount||0); }
    if (day["Studio"])        { nST++; rST += Number(day["Studio"].amount||0); }
  });
  document.getElementById("statRevBH").textContent       = rBH.toLocaleString("fr-FR") + " €";
  document.getElementById("statRevST").textContent       = rST.toLocaleString("fr-FR") + " €";
  const nT=nBH+nST, rT=rBH+rST;
  document.getElementById("statNightsTotal").textContent = nT + " nuit" + (nT>1?"s":"");
  document.getElementById("statRevTotal").textContent    = rT.toLocaleString("fr-FR") + " €";
}

function prevMonth() { if(curMonth===0){curMonth=11;curYear--;}else curMonth--; renderCalendar(); }
function nextMonth() { if(curMonth===11){curMonth=0;curYear++;}else curMonth++; renderCalendar(); }

// ── Sélecteur de mois
let mpYear = 0;
function openMonthPicker() {
  mpYear = curYear;
  renderMonthPicker();
  document.getElementById("mpOverlay").classList.add("open");
}
function closeMonthPicker() {
  document.getElementById("mpOverlay").classList.remove("open");
}
function mpPrevYear() { mpYear--; renderMonthPicker(); }
function mpNextYear() { mpYear++; renderMonthPicker(); }
function renderMonthPicker() {
  document.getElementById("mpYear").textContent = mpYear;
  const grid = document.getElementById("mpGrid");
  grid.innerHTML = MONTHS_FR.map(function(m, i) {
    const isCur = (i === curMonth && mpYear === curYear);
    return '<button class="mp-cell' + (isCur?" current":"") + '" onclick="pickMonth(' + i + ')">' + m + '</button>';
  }).join("");
}
function pickMonth(m) {
  curMonth = m;
  curYear = mpYear;
  closeMonthPicker();
  renderCalendar();
}

// ── Montants par défaut
const DEFAULT_AMOUNTS = {
  "Bel Horizonte": { Airbnb: 100, Booking: 100, Perso: 100 },
  "Studio":        { Airbnb: 67,  Booking: 62,  Perso: 0 }
};
const APT_COLORS = { "Bel Horizonte": "#2E7CF6", "Studio": "#FFB300" };

// ── Modal
function openModal(day) {
  modalDay = day; editingApt = null;
  const dk = dkey(curYear, curMonth, day), b = bookings[dk] || {};
  document.getElementById("modalDate").textContent = day + " " + MONTHS_FR[curMonth] + " " + curYear;
  const apts = Object.entries(b);
  document.getElementById("modalStatus").innerHTML = apts.length === 0
    ? '<span class="modal-free">Disponible</span>'
    : apts.map(([apt,bk]) => '<span class="modal-badge" style="color:' + APT_COLORS[apt] + '">' + apt + ' · ' + bk.platform + '</span>').join("");
  showMain(dk);
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function showMain(dk) {
  document.getElementById("modalMain").style.display = "";
  document.getElementById("modalForm").style.display = "none";
  renderAptCards(dk);
}

function renderAptCards(dk) {
  const b = bookings[dk] || {}, container = document.getElementById("aptCards");
  container.innerHTML = "";
  ["Bel Horizonte","Studio"].forEach(apt => {
    const bk = b[apt];
    const card = document.createElement("div");
    card.className = "apt-card" + (bk ? " occupied" : "");
    card.style.borderColor = bk ? APT_COLORS[apt] + "60" : "#242424";
    const icon = apt === "Bel Horizonte" ? "🏡" : "🏠";
    if (bk) {
      // Période du séjour
      let periodStr = "";
      if (bk.stay) {
        const r = stayRange(apt, bk.stay);
        if (r) {
          const sp = r.start.split("-"), ep = r.end.split("-");
          const sLabel = parseInt(sp[2]) + " " + MONTHS_FR[parseInt(sp[1])-1];
          const eLabel = parseInt(ep[2]) + " " + MONTHS_FR[parseInt(ep[1])-1];
          periodStr = '<div class="apt-card-period">' + sLabel + ' → ' + eLabel + ' · ' + r.nights + ' nuit' + (r.nights>1?'s':'') + '</div>';
        }
      }
      const totalAmount = bk.amount ? Number(bk.amount).toLocaleString("fr-FR") + " € / nuit" : "—";
      const guestsStr = bk.guests ? '<div class="apt-card-period">👤 ' + bk.guests + ' personne' + (Number(bk.guests)>1?'s':'') + '</div>' : "";
      const noteStr = bk.note ? '<div class="apt-card-note">📝 ' + bk.note.replace(/</g,"&lt;").replace(/>/g,"&gt;") + '</div>' : "";
      card.innerHTML =
        '<div class="apt-card-head"><span class="apt-card-name" style="color:' + APT_COLORS[apt] + '">' + icon + ' ' + apt + '</span>' +
        '<span class="apt-card-amount">' + totalAmount + '</span></div>' +
        '<div class="apt-card-plat" style="color:' + PLATFORM_COLORS[bk.platform] + '">' + PLATFORM_ICONS[bk.platform] + ' ' + bk.platform + '</div>' +
        periodStr +
        guestsStr +
        noteStr +
        '<div class="apt-card-actions">' +
        '<button class="card-edit-btn" onclick="startEdit(\'' + apt + '\')">✏️ Modifier</button>' +
        '<button class="card-del-btn" onclick="deleteBooking(\'' + apt + '\')">🗑️ Supprimer</button>' +
        '</div>';
    } else {
      card.innerHTML =
        '<div class="apt-card-head"><span class="apt-card-name" style="color:#777">' + icon + ' ' + apt + '</span></div>' +
        '<div class="apt-card-free">Disponible</div>' +
        '<button class="card-add-btn" style="border-color:' + APT_COLORS[apt] + '40;color:' + APT_COLORS[apt] + '" onclick="startAdd(\'' + apt + '\')">+ Ajouter une location</button>';
    }
    container.appendChild(card);
  });
}

function defaultAmount(apt, plat) {
  return (DEFAULT_AMOUNTS[apt] && DEFAULT_AMOUNTS[apt][plat] !== undefined) ? DEFAULT_AMOUNTS[apt][plat] : 0;
}

function startAdd(apt) {
  editingApt = null; editingStay = null;
  selApt = apt;
  selPlat = "Airbnb";
  document.getElementById("amountInput").value = defaultAmount(apt, "Airbnb") || "";
  document.getElementById("noteInput").value = "";
  document.getElementById("guestsInput").value = "";
  // Date de début = jour cliqué, date de fin = lendemain (1 nuit par défaut)
  const startDk = dkey(curYear, curMonth, modalDay);
  const endD = new Date(curYear, curMonth, modalDay + 1);
  const endDk = dkey(endD.getFullYear(), endD.getMonth(), endD.getDate());
  document.getElementById("startDate").value = startDk;
  document.getElementById("endDate").value = endDk;
  document.getElementById("datesGroup").style.display = "";
  document.getElementById("deleteFormBtn").style.display = "none";
  document.getElementById("formBanner").innerHTML = '<span style="color:' + APT_COLORS[apt] + '">' + (apt === "Bel Horizonte" ? "🏡" : "🏠") + ' ' + apt + '</span> · Nouvelle location';
  updatePlatBtns(); updateDatesUI();
  showForm();
}

function startEdit(apt) {
  const dk = dkey(curYear, curMonth, modalDay);
  const bk = bookings[dk] && bookings[dk][apt];
  if (!bk) return;
  editingApt = apt;
  editingStay = bk.stay || "";
  selApt = apt;
  selPlat = bk.platform;
  document.getElementById("amountInput").value = bk.amount || "";
  document.getElementById("noteInput").value = bk.note || "";
  document.getElementById("guestsInput").value = bk.guests || "";
  // Charger les dates complètes du séjour
  const r = editingStay ? stayRange(apt, editingStay) : null;
  if (r) {
    document.getElementById("startDate").value = r.start;
    document.getElementById("endDate").value = r.end;
  } else {
    // séjour 1 nuit sans ID (ancien format) — fallback
    document.getElementById("startDate").value = dk;
    const endD = new Date(curYear, curMonth, modalDay + 1);
    document.getElementById("endDate").value = dkey(endD.getFullYear(), endD.getMonth(), endD.getDate());
  }
  document.getElementById("datesGroup").style.display = "";
  document.getElementById("deleteFormBtn").style.display = "block";
  document.getElementById("formBanner").innerHTML = '<span style="color:' + APT_COLORS[apt] + '">' + (apt === "Bel Horizonte" ? "🏡" : "🏠") + ' ' + apt + '</span> · Modification';
  updatePlatBtns(); updateDatesUI();
  showForm();
}

function showForm() {
  document.getElementById("modalMain").style.display = "none";
  document.getElementById("modalForm").style.display = "";
}

function backToMain() {
  const dk = dkey(curYear, curMonth, modalDay);
  editingApt = null; editingStay = null;
  showMain(dk);
}

function deleteBooking(apt) {
  // Demande de confirmation
  const dk = dkey(curYear, curMonth, modalDay);
  const bk = bookings[dk] && bookings[dk][apt];
  if (!bk) return;
  let periodTxt = "";
  if (bk.stay) {
    const r = stayRange(apt, bk.stay);
    if (r) {
      const sp = r.start.split("-"), ep = r.end.split("-");
      periodTxt = " (" + parseInt(sp[2]) + " " + MONTHS_FR[parseInt(sp[1])-1] + " → " + parseInt(ep[2]) + " " + MONTHS_FR[parseInt(ep[1])-1] + ")";
    }
  }
  pendingDelete = { apt: apt };
  document.getElementById("confirmText").innerHTML =
    "Supprimer la réservation <b>" + apt + "</b>" + periodTxt + " ?<br><span style='color:#777;font-size:0.85rem'>Cette action est définitive.</span>";
  document.getElementById("confirmOverlay").classList.add("open");
}

function confirmDelete() {
  document.getElementById("confirmOverlay").classList.remove("open");
  if (!pendingDelete) return;
  const apt = pendingDelete.apt;
  pendingDelete = null;
  doDeleteBooking(apt);
}

function cancelDelete() {
  document.getElementById("confirmOverlay").classList.remove("open");
  pendingDelete = null;
}

function doDeleteBooking(apt) {
  const dk = dkey(curYear, curMonth, modalDay);
  if (!bookings[dk] || !bookings[dk][apt]) return;
  const bk = bookings[dk][apt];
  const stayId = bk.stay || "";
  if (stayId) {
    const dates = findStayDates(apt, stayId);
    dates.forEach(function(d) { addJournalEntry("del", apt, d, bk.platform, bk.amount); });
    deleteStay(apt, stayId);
  } else {
    // séjour 1 nuit sans ID
    addJournalEntry("del", apt, dk, bk.platform, bk.amount);
    delete bookings[dk][apt];
    if (Object.keys(bookings[dk]).length === 0) delete bookings[dk];
  }
  editingApt = null; editingStay = null;
  scheduleSave(); renderCalendar();
  const b = bookings[dk] || {}, apts = Object.entries(b);
  document.getElementById("modalStatus").innerHTML = apts.length === 0
    ? '<span class="modal-free">Disponible</span>'
    : apts.map(([a,bk]) => '<span class="modal-badge" style="color:' + APT_COLORS[a] + '">' + a + ' · ' + bk.platform + '</span>').join("");
  showMain(dk);
}

function deleteFromForm() {
  if (!editingApt) return;
  deleteBooking(editingApt);
}

function closeModal() { document.getElementById("overlay").classList.remove("open"); document.body.style.overflow = ""; modalDay = null; editingApt = null; editingStay = null; }
function handleOverlayClick(e) { if (e.target === document.getElementById("overlay")) closeModal(); }

function selectPlat(p) {
  if (!editingApt) {
    const cur = document.getElementById("amountInput").value;
    const oldDefault = defaultAmount(selApt, selPlat);
    if (cur === "" || Number(cur) === oldDefault) {
      document.getElementById("amountInput").value = defaultAmount(selApt, p) || "";
    }
  }
  selPlat = p;
  updatePlatBtns(); updateDatesUI();
}

function updatePlatBtns() {
  ["Airbnb","Booking","Perso"].forEach(p => {
    const btn = document.getElementById("plat" + p), sel = selPlat === p;
    btn.classList.toggle("sel", sel);
    btn.style.color = sel ? PLATFORM_COLORS[p] : "";
    btn.style.borderColor = sel ? PLATFORM_COLORS[p] + "50" : "";
  });
}

// Nombre de nuits entre 2 dates ISO (YYYY-MM-DD)
function nightsBetween(startStr, endStr) {
  const s = new Date(startStr + "T00:00:00");
  const e = new Date(endStr + "T00:00:00");
  const diff = Math.round((e - s) / 86400000);
  return diff;
}

// ── Sélecteur de date personnalisé (bottom sheet)
let dpField = null;     // "start" ou "end"
let dpYear = 0, dpMonth = 0;

function openDatePicker(field) {
  dpField = field;
  const cur = document.getElementById(field === "start" ? "startDate" : "endDate").value;
  let base;
  if (cur) { const p = cur.split("-"); dpYear = parseInt(p[0]); dpMonth = parseInt(p[1]) - 1; }
  else { dpYear = curYear; dpMonth = curMonth; }
  renderDatePicker();
  document.getElementById("dpOverlay").classList.add("open");
}

function closeDatePicker() {
  document.getElementById("dpOverlay").classList.remove("open");
  dpField = null;
}

function handleDpOverlayClick(e) {
  if (e.target === document.getElementById("dpOverlay")) closeDatePicker();
}

function dpPrevMonth() { if (dpMonth===0){dpMonth=11;dpYear--;} else dpMonth--; renderDatePicker(); }
function dpNextMonth() { if (dpMonth===11){dpMonth=0;dpYear++;} else dpMonth++; renderDatePicker(); }

function renderDatePicker() {
  document.getElementById("dpTitle").textContent = MONTHS_FR[dpMonth] + " " + dpYear;
  const dow = document.getElementById("dpDow");
  dow.innerHTML = DAYS_FR.map(d => "<span>" + d + "</span>").join("");
  const grid = document.getElementById("dpGrid");
  grid.innerHTML = "";
  const days = daysInMonth(dpYear, dpMonth);
  const offset = firstWeekday(dpYear, dpMonth);
  const selStr = document.getElementById(dpField === "start" ? "startDate" : "endDate").value;
  for (let i=0; i<offset; i++) { const e = document.createElement("div"); e.className = "dp-cell empty"; grid.appendChild(e); }
  for (let d=1; d<=days; d++) {
    const dk = dkey(dpYear, dpMonth, d);
    const cell = document.createElement("button");
    cell.className = "dp-cell" + (dk === selStr ? " selected" : "") + (dk === todayKey ? " today" : "");
    cell.textContent = d;
    cell.onclick = () => pickDate(dk);
    grid.appendChild(cell);
  }
}

function pickDate(dk) {
  if (dpField === "start") {
    document.getElementById("startDate").value = dk;
    // Si la date de départ est avant ou égale, la décaler au lendemain
    const endStr = document.getElementById("endDate").value;
    if (!endStr || nightsBetween(dk, endStr) <= 0) {
      const d = new Date(dk + "T00:00:00"); d.setDate(d.getDate() + 1);
      document.getElementById("endDate").value = dkey(d.getFullYear(), d.getMonth(), d.getDate());
    }
  } else {
    document.getElementById("endDate").value = dk;
  }
  closeDatePicker();
  updateDatesUI();
}

function fmtDateLabel(iso) {
  if (!iso) return "—";
  const p = iso.split("-");
  return parseInt(p[2]) + " " + MONTHS_FR[parseInt(p[1])-1].slice(0,4) + ". " + p[0];
}

function updateDatesUI() {
  const startStr = document.getElementById("startDate").value;
  const endStr = document.getElementById("endDate").value;
  document.getElementById("startDateBtn").textContent = fmtDateLabel(startStr);
  document.getElementById("endDateBtn").textContent = fmtDateLabel(endStr);
  const hint = document.getElementById("datesHint");
  if (!startStr || !endStr) { hint.textContent = ""; return; }
  const nights = nightsBetween(startStr, endStr);
  if (nights <= 0) {
    hint.style.color = "#FF3B30";
    hint.textContent = "La date de départ doit être après l'arrivée";
    document.getElementById("amountHint").textContent = "";
    document.getElementById("saveBtn").textContent = editingApt ? "Enregistrer la modification" : "Enregistrer";
    return;
  }
  // Vérification de chevauchement
  if (hasOverlap(selApt, startStr, endStr, editingStay)) {
    hint.style.color = "#FF3B30";
    hint.textContent = "⚠️ Chevauche une réservation existante";
  } else {
    hint.style.color = "#555";
    hint.textContent = nights + " nuit" + (nights>1?"s":"");
  }
  const v = Number(document.getElementById("amountInput").value) || 0;
  document.getElementById("amountHint").textContent = v > 0
    ? "= " + (v * nights).toLocaleString("fr-FR") + " € au total (" + nights + " nuit" + (nights>1?"s":"") + ")"
    : "";
  document.getElementById("saveBtn").textContent = editingApt
    ? "Enregistrer la modification"
    : "Enregistrer (" + nights + " nuit" + (nights>1?"s":"") + ")";
}

function saveBooking() {
  if (!modalDay) return;
  const amount = document.getElementById("amountInput").value;
  const startStr = document.getElementById("startDate").value;
  const endStr = document.getElementById("endDate").value;
  if (!startStr || !endStr) return;
  const nights = nightsBetween(startStr, endStr);
  if (nights <= 0) { alert("La date de départ doit être après la date d'arrivée."); return; }

  // Blocage si chevauchement (en ignorant le séjour en cours de modification)
  if (hasOverlap(selApt, startStr, endStr, editingApt ? editingStay : null)) {
    alert("Cette période chevauche une réservation existante pour " + selApt + ". Ajout impossible.");
    return;
  }

  // En modification : supprimer l'ancien séjour d'abord
  if (editingApt && editingStay) {
    deleteStay(editingApt, editingStay);
  } else if (editingApt && !editingStay) {
    // ancien format 1 nuit sans ID
    const odk = dkey(curYear, curMonth, modalDay);
    if (bookings[odk] && bookings[odk][editingApt]) {
      delete bookings[odk][editingApt];
      if (Object.keys(bookings[odk]).length === 0) delete bookings[odk];
    }
  }

  // Créer le séjour (inséparable) — toutes les nuits partagent le même ID
  const stayId = newStayId();
  const noteVal = document.getElementById("noteInput").value.trim();
  const guestsVal = document.getElementById("guestsInput").value;
  const action = editingApt ? "edit" : "add";
  let cur = new Date(startStr + "T00:00:00");
  for (let i = 0; i < nights; i++) {
    const dk = dkey(cur.getFullYear(), cur.getMonth(), cur.getDate());
    if (!bookings[dk]) bookings[dk] = {};
    bookings[dk][selApt] = { platform: selPlat, amount: amount, stay: stayId, note: noteVal, guests: guestsVal };
    addJournalEntry(action, selApt, dk, selPlat, amount);
    cur.setDate(cur.getDate() + 1);
  }

  editingApt = null; editingStay = null;
  scheduleSave(); renderCalendar(); closeModal();
}

// ── Journal
let journalOpenDays = {}; // { "2026-06-11": true/false }

function renderJournal() {
  const list = document.getElementById("journalList");
  if (journal.length === 0) { list.innerHTML = '<div class="empty-state">Aucune modification enregistrée.</div>'; return; }

  const labels = { add: "Ajout", del: "Suppression", edit: "Modification" };

  // Grouper par jour de modification (date du timestamp)
  const groups = {}; // dayKey -> [entries]
  const order = [];  // dayKeys dans l'ordre d'apparition (récent → ancien)
  journal.forEach(function(e) {
    const d = new Date(e.ts);
    const dayKey = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    if (!groups[dayKey]) { groups[dayKey] = []; order.push(dayKey); }
    groups[dayKey].push(e);
  });

  let html = "";
  order.forEach(function(dayKey) {
    const entries = groups[dayKey];
    const parts = dayKey.split("-");
    const dayD = new Date(dayKey + "T00:00:00");
    const weekday = dayD.toLocaleDateString("fr-FR", {weekday:"long"});
    const headLabel = weekday.charAt(0).toUpperCase() + weekday.slice(1) + " " + parseInt(parts[2]) + " " + MONTHS_FR[parseInt(parts[1])-1] + " " + parts[0];
    const isOpen = journalOpenDays[dayKey] !== false; // ouvert par défaut
    const count = entries.length;

    const items = entries.map(function(e) {
      const d = new Date(e.ts);
      const timeStr = d.toLocaleTimeString("fr-FR", {hour:"2-digit",minute:"2-digit"});
      const p = e.date.split("-");
      const dayLabel = parseInt(p[2]) + " " + MONTHS_FR[parseInt(p[1])-1] + " " + p[0];
      const amountStr = e.amount ? " · " + Number(e.amount).toLocaleString("fr-FR") + " €" : "";
      return '<div class="journal-item"><span class="journal-action ' + e.action + '">' + (labels[e.action]||e.action) + '</span><div class="journal-detail">' + e.apt + ' · ' + e.platform + amountStr + '</div><div class="journal-detail" style="color:#666">' + dayLabel + '</div><div class="journal-meta">' + timeStr + '</div></div>';
    }).join("");

    html += '<div class="journal-group">' +
      '<button class="journal-group-head" onclick="toggleJournalDay(\'' + dayKey + '\')">' +
        '<span class="journal-chevron' + (isOpen?" open":"") + '">▶</span>' +
        '<span class="journal-group-title">' + headLabel + '</span>' +
        '<span class="journal-group-count">' + count + '</span>' +
      '</button>' +
      '<div class="journal-group-body' + (isOpen?" open":"") + '">' + items + '</div>' +
    '</div>';
  });

  list.innerHTML = html;
}

function toggleJournalDay(dayKey) {
  const cur = journalOpenDays[dayKey] !== false;
  journalOpenDays[dayKey] = !cur;
  renderJournal();
}

// ── Gains
function renderGains() {
  const container = document.getElementById("gainsContent");
  const data = {}; let grandTotal = 0;
  Object.keys(bookings).sort().forEach(function(dk) {
    const parts = dk.split("-"), y = parts[0], m = parseInt(parts[1]) - 1;
    if (!data[y]) data[y] = {};
    if (!data[y][m]) data[y][m] = { BH: {nights:0,rev:0}, ST: {nights:0,rev:0} };
    var day = bookings[dk];
    if (day["Bel Horizonte"]) { data[y][m].BH.nights++; var r=Number(day["Bel Horizonte"].amount||0); data[y][m].BH.rev+=r; grandTotal+=r; }
    if (day["Studio"])        { data[y][m].ST.nights++; var r2=Number(day["Studio"].amount||0); data[y][m].ST.rev+=r2; grandTotal+=r2; }
  });
  if (Object.keys(data).length === 0) { container.innerHTML = '<div class="empty-state">Aucune donnée disponible.</div>'; return; }
  var html = "";
  Object.keys(data).sort().reverse().forEach(function(year) {
    var yearTotal = 0, tableRows = "";
    Object.keys(data[year]).sort(function(a,b){return b-a;}).forEach(function(m) {
      var row = data[year][m], monthTotal = row.BH.rev + row.ST.rev; yearTotal += monthTotal;
      tableRows += '<tr><td>' + MONTHS_FR[m] + '</td><td>' + (row.BH.rev ? row.BH.rev.toLocaleString("fr-FR")+" €" : "—") + '</td><td>' + (row.ST.rev ? row.ST.rev.toLocaleString("fr-FR")+" €" : "—") + '</td><td style="color:#fff">' + monthTotal.toLocaleString("fr-FR") + ' €</td></tr>';
    });
    html += '<div class="gains-section"><div class="gains-section-title">' + year + '</div><table class="gains-table"><thead><tr><th>Mois</th><th>Bel Horizonte</th><th>Studio</th><th>Total</th></tr></thead><tbody>' + tableRows + '<tr class="total-row"><td>Total ' + year + '</td><td colspan="2"></td><td>' + yearTotal.toLocaleString("fr-FR") + ' €</td></tr></tbody></table></div>';
  });
  html += '<div class="gains-grand-total"><span class="gains-grand-label">Total tous appartements</span><span class="gains-grand-value">' + grandTotal.toLocaleString("fr-FR") + ' €</span></div>';
  container.innerHTML = html;
}

// ── Notes
function loadNotesUI() {
  document.getElementById("notesArea").value = notes;
  document.getElementById("notesStatus").textContent = "";
}

function scheduleNotesSave() {
  notes = document.getElementById("notesArea").value;
  document.getElementById("notesStatus").textContent = "Modification en cours…";
  clearTimeout(notesTimeout);
  notesTimeout = setTimeout(function() {
    scheduleSave();
    document.getElementById("notesStatus").textContent = "Sauvegardé";
    setTimeout(function(){ document.getElementById("notesStatus").textContent = ""; }, 2000);
  }, 1500);
}

// ── Init
loadFromSheets();
</script>
